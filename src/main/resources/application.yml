spring:
  application:
    name: interview-prep-backend

  datasource:
    url: jdbc:mysql://localhost:3306/interviewprep?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 8858
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
          enabled: true
          max-file-size: 10MB
          max-request-size: 10MB

server:
  port: 8080

app:
  upload:
    dir: uploads
  base-url: http://localhost:8080
  jwt:
    secret: 7a8f3e2b1c9d4f6e0a5b8c2d7e1f4a9b3c6d0e5f2a8b1c4d7e0f3a6b9c2d5e8
    expiration-ms: 86400000


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.interviewprep: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
